<svg viewBox="0 0 1600 980" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="1600" height="980" fill="#FFFFFF"/>

  <!-- diagram frame -->
  <rect x="40" y="40" width="1520" height="900" rx="14" fill="#FFFFFF" stroke="#D6DBE0" stroke-width="1.5"/>

  <!-- title (serif) -->
  <text x="80" y="104" font-family="DejaVu Serif" font-size="30" font-weight="bold" fill="#1F2933">Ryani &#215; Leo &#8212; Studio v0 &#183; The First Four-Agent Chain</text>
  <text x="82" y="134" font-family="DejaVu Sans" font-size="17" fill="#6B7280">concept &#8594; writing &#8594; footage / generation &#8594; human review &#160;&#183;&#160; these four later split into the full studio</text>

  <!-- ===== Canon band ===== -->
  <rect x="80" y="166" width="1440" height="94" rx="8" fill="#F3F4F6"/>
  <text x="106" y="201" font-family="DejaVu Sans" font-size="20" font-weight="bold" fill="#1F2933">Character Canon <tspan font-size="15" font-weight="normal" fill="#8A9099">&#8212; one shared source of truth</tspan></text>
  <text x="106" y="229" font-family="DejaVu Sans" font-size="16" fill="#454B52"><tspan font-weight="bold">Ryani</tspan> &#183; tailless black Frenchie &#183; white chin, chest &amp; paws &#160;&#160;&#160;&#160;|&#160;&#160;&#160;&#160; <tspan font-weight="bold">Leo</tspan> &#183; orange tabby &#183; ~8 months</text>
  <text x="106" y="252" font-family="DejaVu Sans" font-style="italic" font-size="15" fill="#B0492A">Change it once  &#8594;  the fix propagates to every agent.</text>
  <text x="800" y="286" text-anchor="middle" font-family="DejaVu Sans" font-size="14" fill="#9AA3AD">every stage reads the canon &#8595;</text>

  <!-- ===== stage-label pills ===== -->
  <g font-family="DejaVu Sans" font-size="12" font-weight="bold" letter-spacing="2" fill="#9AA3AD" text-anchor="middle">
    <rect x="80"   y="300" width="318" height="26" rx="6" fill="#EEF0F2"/><text x="239"  y="317">CONCEPT</text>
    <rect x="452"  y="300" width="318" height="26" rx="6" fill="#EEF0F2"/><text x="611"  y="317">WRITE</text>
    <rect x="824"  y="300" width="318" height="26" rx="6" fill="#EEF0F2"/><text x="983"  y="317">GENERATE / SHOOT</text>
    <rect x="1196" y="300" width="318" height="26" rx="6" fill="#EEF0F2"/><text x="1355" y="317">REVIEW</text>
  </g>

  <!-- arrow marker -->
  <defs>
    <marker id="arw" markerWidth="10" markerHeight="10" refX="6.5" refY="5" orient="auto">
      <path d="M0,0 L9,5 L0,10 z" fill="#B0492A"/>
    </marker>
  </defs>

  <!-- ===== agent cards ===== -->
  <!-- Card 1 Director -->
  <rect x="80" y="344" width="318" height="152" rx="8" fill="#FFFFFF" stroke="#D6DBE0" stroke-width="1.5"/>
  <text x="239" y="400" text-anchor="middle" font-family="DejaVu Sans" font-size="23" font-weight="bold" fill="#1F2933">Director</text>
  <text x="239" y="430" text-anchor="middle" font-family="DejaVu Sans" font-size="16" fill="#454B52">sets the concept</text>
  <text x="239" y="458" text-anchor="middle" font-family="DejaVu Sans" font-style="italic" font-size="14" fill="#9AA3AD">season themes &#183; flights of imagination</text>

  <line x1="398" y1="420" x2="446" y2="420" stroke="#B0492A" stroke-width="2.5" marker-end="url(#arw)"/>

  <!-- Card 2 Writer -->
  <rect x="452" y="344" width="318" height="152" rx="8" fill="#FFFFFF" stroke="#D6DBE0" stroke-width="1.5"/>
  <text x="611" y="400" text-anchor="middle" font-family="DejaVu Sans" font-size="23" font-weight="bold" fill="#1F2933">Writer</text>
  <text x="611" y="430" text-anchor="middle" font-family="DejaVu Sans" font-size="16" fill="#454B52">story + captions</text>
  <text x="611" y="458" text-anchor="middle" font-family="DejaVu Sans" font-style="italic" font-size="14" fill="#9AA3AD">the actual beats &amp; on-screen text</text>

  <line x1="770" y1="420" x2="818" y2="420" stroke="#B0492A" stroke-width="2.5" marker-end="url(#arw)"/>

  <!-- Card 3 Camera (highlighted) -->
  <rect x="824" y="344" width="318" height="152" rx="8" fill="#F9EEE8" stroke="#C06A48" stroke-width="2.5"/>
  <text x="983" y="400" text-anchor="middle" font-family="DejaVu Sans" font-size="23" font-weight="bold" fill="#B0492A">Camera</text>
  <text x="983" y="430" text-anchor="middle" font-family="DejaVu Sans" font-size="16" fill="#454B52">find &amp; edit footage</text>
  <text x="983" y="458" text-anchor="middle" font-family="DejaVu Sans" font-style="italic" font-size="14" fill="#9A6B55">if none exists, generate it, then caption</text>

  <line x1="1142" y1="420" x2="1190" y2="420" stroke="#B0492A" stroke-width="2.5" marker-end="url(#arw)"/>

  <!-- Card 4 PD -->
  <rect x="1196" y="344" width="318" height="152" rx="8" fill="#FFFFFF" stroke="#D6DBE0" stroke-width="1.5"/>
  <rect x="1422" y="358" width="78" height="22" rx="11" fill="#B0492A"/>
  <text x="1461" y="373" text-anchor="middle" font-family="DejaVu Sans" font-size="12" font-weight="bold" letter-spacing="1" fill="#FFFFFF">HUMAN</text>
  <text x="1355" y="400" text-anchor="middle" font-family="DejaVu Sans" font-size="23" font-weight="bold" fill="#1F2933">PD (you)</text>
  <text x="1355" y="430" text-anchor="middle" font-family="DejaVu Sans" font-size="16" fill="#454B52">human review</text>
  <text x="1355" y="458" text-anchor="middle" font-family="DejaVu Sans" font-style="italic" font-size="14" fill="#9AA3AD">upload / revise / discard</text>

  <!-- number badges -->
  <g font-family="DejaVu Sans" font-size="15" font-weight="bold" text-anchor="middle">
    <circle cx="110" cy="374" r="14" fill="#B0492A"/><text x="110" y="379" fill="#fff">1</text>
    <circle cx="482" cy="374" r="14" fill="#B0492A"/><text x="482" y="379" fill="#fff">2</text>
    <circle cx="854" cy="374" r="14" fill="#B0492A"/><text x="854" y="379" fill="#fff">3</text>
    <circle cx="1226" cy="374" r="14" fill="#B0492A"/><text x="1226" y="379" fill="#fff">4</text>
  </g>

  <!-- ===== Camera branch ===== -->
  <g stroke="#C06A48" stroke-width="2" fill="none">
    <path d="M983,496 L983,546"/>
    <path d="M735,546 L1185,546"/>
    <path d="M735,546 L735,566" marker-end="url(#arw2)"/>
    <path d="M1185,546 L1185,566" marker-end="url(#arw2)"/>
  </g>
  <defs>
    <marker id="arw2" markerWidth="10" markerHeight="10" refX="6.5" refY="5" orient="auto">
      <path d="M0,0 L9,5 L0,10 z" fill="#C06A48"/>
    </marker>
  </defs>
  <rect x="913" y="534" width="140" height="24" rx="4" fill="#FFFFFF"/>
  <text x="983" y="551" text-anchor="middle" font-family="DejaVu Sans" font-style="italic" font-size="14" fill="#B0492A">matching clip?</text>

  <!-- RF card -->
  <rect x="560" y="566" width="350" height="130" rx="8" fill="#FFFFFF" stroke="#D6DBE0" stroke-width="1.5"/>
  <text x="735" y="594" text-anchor="middle" font-family="DejaVu Sans" font-size="12" font-weight="bold" letter-spacing="2" fill="#9AA3AD">HAS A MATCHING CLIP</text>
  <text x="735" y="626" text-anchor="middle" font-family="DejaVu Sans" font-size="20" font-weight="bold" fill="#1F2933">RF &#183; real footage</text>
  <text x="735" y="654" text-anchor="middle" font-family="DejaVu Sans" font-size="16" fill="#454B52">trim &#183; edit &#183; caption</text>
  <text x="735" y="680" text-anchor="middle" font-family="DejaVu Sans" font-style="italic" font-size="14" fill="#9AA3AD">truth &#8212; bound to what was filmed</text>

  <!-- AV card (generation = rust) -->
  <rect x="1010" y="566" width="350" height="130" rx="8" fill="#F9EEE8" stroke="#C06A48" stroke-width="2.5"/>
  <text x="1185" y="594" text-anchor="middle" font-family="DejaVu Sans" font-size="12" font-weight="bold" letter-spacing="2" fill="#C0876E">NO MATCHING CLIP</text>
  <text x="1185" y="626" text-anchor="middle" font-family="DejaVu Sans" font-size="20" font-weight="bold" fill="#B0492A">AV &#183; AI vtuber</text>
  <text x="1185" y="654" text-anchor="middle" font-family="DejaVu Sans" font-size="16" fill="#454B52">generate, then caption</text>
  <text x="1185" y="680" text-anchor="middle" font-family="DejaVu Sans" font-style="italic" font-size="14" fill="#9A6B55">imagination &#8212; every frame is generated</text>

  <!-- ===== footer / wall ===== -->
  <line x1="80" y1="736" x2="1520" y2="736" stroke="#E3E6E9" stroke-width="1.5"/>
  <text x="80" y="774" font-family="DejaVu Sans" font-size="18" fill="#454B52"><tspan font-weight="bold" fill="#1F2933">The wall:</tspan> the concept the Director sets <tspan font-weight="bold" fill="#1F2933">may not exist in any real clip</tspan> &#8212; what the Camera agent hits every time.</text>
  <text x="80" y="806" font-family="DejaVu Sans" font-size="18" fill="#454B52">So the two lanes aren't rivals &#8212; <tspan font-weight="bold" fill="#3E5F82">RF = truth</tspan>, <tspan font-weight="bold" fill="#B0492A">AV = imagination</tspan> &#8212; and the Canon keeps both on-model: fix a detail once, every stage inherits it.</text>
</svg>
